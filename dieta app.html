<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="La Mia Dieta" />
  <title>🌿 La Mia Dieta</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f0faf4; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
    button { font-family: inherit; }
    textarea, input, select { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── MENU 2 SETTIMANE ──────────────────────────────────────────────
const WEEK1 = {
  "Lunedì":    { colazione:"Yogurt greco 150g + miele + mirtilli 100g + granola 20g", pranzo:"Orata al forno con pomodorini e olive + patate al forno 150g + insalata verde", spuntino:"2 fette biscottate + yogurt greco 80g + miele", cena:"Pollo al limone 200g + zucchine grigliate + patate al forno 100g" },
  "Martedì":   { colazione:"2 fette biscottate + miele + yogurt greco 150g + fragole 100g", pranzo:"Insalatona: lattuga, pomodorini, avocado ½, feta 40g, cetriolo, tonno 100g + olio EVO", spuntino:"Mela + mandorle 15g", cena:"Merluzzo al forno con pomodori cotti e capperi + patate lesse 150g + insalata" },
  "Mercoledì": { colazione:"Yogurt greco 150g + granola 20g + banana ½ + miele", pranzo:"Pollo al curry 200g (yogurt + curcuma + curry) + riso basmati 60g + insalata pomodorini", spuntino:"2 fette biscottate + miele + frutta fresca", cena:"Polipo lesso con patate 150g + prezzemolo + limone + olio EVO + insalata" },
  "Giovedì":   { colazione:"2 fette biscottate + miele + yogurt greco 150g + mirtilli 80g", pranzo:"Uova strapazzate 3 con pomodori cotti e basilico + patate al forno 150g + insalata", spuntino:"Yogurt greco 100g + miele + noci 10g", cena:"Salmone al forno con finocchio e limone 150g + patate 100g + pomodorini" },
  "Venerdì":   { colazione:"Yogurt greco 150g + granola 20g + fragole 100g + miele", pranzo:"Pollo ai funghi 200g + patate lesse 150g + insalata verde", spuntino:"2 fette biscottate + avocado ¼ schiacciato + limone", cena:"Orata al cartoccio con pomodorini e erbe 200g + patate 100g + insalata" },
  "Sabato":    { colazione:"2 fette biscottate + miele + yogurt greco 150g + frutti di bosco 100g", pranzo:"Insalatona greca: lattuga, pomodorini, cetriolo, feta 50g, olive, cipolla rossa + olio EVO", spuntino:"Mela + yogurt greco 80g", cena:"Tacchino al limone e rosmarino 200g + patate 150g + zucchine grigliate" },
  "Domenica":  { colazione:"Yogurt greco 150g + miele + granola 20g + pesche 100g", pranzo:"Manzo alla griglia 150g + patate al forno 150g + insalata pomodori e basilico", spuntino:"2 fette biscottate + miele + noci 10g", cena:"Merluzzo con pomodori cotti e olive 200g + patate lesse 100g + insalata" },
};
const WEEK2 = {
  "Lunedì":    { colazione:"2 fette biscottate + miele + yogurt greco 150g + mirtilli 100g", pranzo:"Pollo allo yogurt 200g (yogurt + aglio + curcuma + limone) + patate 150g + insalata", spuntino:"Yogurt greco 100g + frutta fresca + miele", cena:"Salmone con avocado e pomodorini 150g + patate lesse 100g + rucola" },
  "Martedì":   { colazione:"Yogurt greco 150g + granola 20g + fragole 100g + miele", pranzo:"Polipo alla griglia 200g + patate lesse con prezzemolo 150g + insalatona mista", spuntino:"2 fette biscottate + miele + mandorle 10g", cena:"Pollo al curry 200g + zucchine e peperoni + patate 100g" },
  "Mercoledì": { colazione:"2 fette biscottate + miele + yogurt greco 150g + banana ½", pranzo:"Insalatona: rucola, pomodorini, avocado ½, feta 40g, uovo sodo, cetriolo + olio EVO", spuntino:"Yogurt greco 100g + miele + noci 10g", cena:"Orata al forno con finocchio e limone 200g + patate 150g + pomodori cotti" },
  "Giovedì":   { colazione:"Yogurt greco 150g + granola 20g + mirtilli 100g + miele", pranzo:"Tacchino ai funghi 200g + patate lesse 150g + insalata verde con pomodorini", spuntino:"2 fette biscottate + avocado schiacciato + limone", cena:"Merluzzo al vapore con pomodori cotti e capperi + patate 150g + insalata" },
  "Venerdì":   { colazione:"2 fette biscottate + miele + yogurt greco 150g + fragole 100g", pranzo:"Pollo al limone 200g + patate 150g + insalatona con pomodorini e feta 30g", spuntino:"Mela + yogurt greco 80g + miele", cena:"Salmone al cartoccio con pomodorini e olive 150g + patate 100g + rucola e avocado" },
  "Sabato":    { colazione:"Yogurt greco 150g + granola 20g + frutti di bosco 100g + miele", pranzo:"Manzo alla griglia 150g + patate 150g + insalata pomodori e basilico", spuntino:"2 fette biscottate + miele + noci 10g", cena:"Polipo con patate e prezzemolo 200g + insalata verde + pomodorini" },
  "Domenica":  { colazione:"2 fette biscottate + miele + yogurt greco 150g + frutta fresca 100g", pranzo:"Pollo ai funghi 200g + patate lesse 150g + insalata mista con feta 30g", spuntino:"Yogurt greco 100g + granola 10g + miele", cena:"Orata al forno con pomodori cotti e olive 200g + patate 100g + insalata verde" },
};

const DAYS = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
const MEAL_ICONS  = { colazione:"☀️", pranzo:"🥗", spuntino:"🍎", cena:"🌙" };
const MEAL_LABELS = { colazione:"Colazione", pranzo:"Pranzo", spuntino:"Spuntino", cena:"Cena" };
const MEAL_KCAL   = { colazione:270, pranzo:400, spuntino:120, cena:410 };
const DAILY_KCAL  = 1200;
const START_KG = 56; const GOAL_KG = 50;
const WATER_GLASSES = 8;

const EXTRA_TIPS = [
  { id:"camminata",   icon:"🚶‍♀️", label:"Camminata 30 min",                desc:"Brucia calorie e migliora la circolazione" },
  { id:"ipopressivi", icon:"🧘‍♀️", label:"Esercizi ipopressivi",            desc:"Fondamentale per diastasi e pancia piatta" },
  { id:"sonno",       icon:"😴",  label:"7-8 ore di sonno",                desc:"Regola cortisolo e appetito" },
  { id:"mastica",     icon:"🍽️", label:"Mangiato lentamente",              desc:"Riduce il gonfiore del 30%" },
  { id:"notv",        icon:"📵",  label:"Niente telefono mentre mangio",    desc:"Migliora digestione e consapevolezza" },
  { id:"tisana",      icon:"🫖",  label:"Tisana di finocchio dopo cena",    desc:"Sgonfia la pancia" },
  { id:"limone",      icon:"🍋",  label:"Acqua tiepida + limone + curcuma", desc:"Al mattino a stomaco vuoto" },
];

const FASTING_WINDOWS = {
  no_breakfast:{ label:"16:8 · Salto colazione", hours:"12:00–20:00", icon:"🌅", color:"#e07a5f" },
  no_dinner:   { label:"16:8 · Salto cena",      hours:"8:00–16:00",  icon:"🌇", color:"#6c63ac" },
};

// date helpers
function dateToKey(d) { return d.toISOString().slice(0,10); }
function keyToDay(key) {
  const d = new Date(key + "T12:00:00");
  return DAYS[d.getDay() === 0 ? 6 : d.getDay()-1];
}
function getWeekMenu(key) {
  // week 1 starts from today minus up to 13 days, alternate weeks
  const base = new Date("2025-01-06"); // Monday ref
  const target = new Date(key + "T12:00:00");
  const diff = Math.floor((target - base) / (7*24*3600*1000));
  return diff % 2 === 0 ? WEEK1 : WEEK2;
}
function todayKey() { return dateToKey(new Date()); }
function keyLabel(key) {
  const d = new Date(key + "T12:00:00");
  return d.toLocaleDateString("it-IT", { weekday:"short", day:"numeric", month:"short" });
}
function addDays(key, n) {
  const d = new Date(key + "T12:00:00");
  d.setDate(d.getDate() + n);
  return dateToKey(d);
}

// storage
const load = (k, def) => { try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : def; } catch { return def; } };
const save = (k, v)   => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ── APP ───────────────────────────────────────────────────────────
function App() {
  const [selectedKey, setSelectedKey]   = useState(todayKey());
  // data keyed by date string "YYYY-MM-DD"
  const [checked,      setChecked]      = useState(() => load("v2Checked", {}));
  const [customMeals,  setCustomMeals]  = useState(() => load("v2Custom", {}));   // {datekey: {colazione:"...", ...}}
  const [water,        setWater]        = useState(() => load("v2Water", {}));
  const [tips,         setTips]         = useState(() => load("v2Tips", {}));
  const [fastingMode,  setFastingMode]  = useState(() => load("v2Fasting", {}));
  const [cheats,       setCheats]       = useState(() => load("v2Cheats", {}));
  const [weightLog,    setWeightLog]    = useState(() => load("v2Weight", []));
  const [measLog,      setMeasLog]      = useState(() => load("v2Meas", []));
  const [wellness,     setWellness]     = useState(() => load("v2Wellness", {}));
  const [integratoriList,   setIntegratoriList]   = useState(() => load("v2Integr", [
    {id:1,name:"Magnesio",dose:"300",unit:"mg"},
    {id:2,name:"Omega-3",dose:"1",unit:"cps"},
    {id:3,name:"Vitamina D",dose:"1000",unit:"UI"},
  ]));
  const [integratoriCheck,  setIntegratoriCheck]  = useState(() => load("v2IntCheck", {}));

  useEffect(() => save("v2Checked",  checked),          [checked]);
  useEffect(() => save("v2Custom",   customMeals),      [customMeals]);
  useEffect(() => save("v2Water",    water),            [water]);
  useEffect(() => save("v2Tips",     tips),             [tips]);
  useEffect(() => save("v2Fasting",  fastingMode),      [fastingMode]);
  useEffect(() => save("v2Cheats",   cheats),           [cheats]);
  useEffect(() => save("v2Weight",   weightLog),        [weightLog]);
  useEffect(() => save("v2Meas",     measLog),          [measLog]);
  useEffect(() => save("v2Wellness", wellness),         [wellness]);
  useEffect(() => save("v2Integr",   integratoriList),  [integratoriList]);
  useEffect(() => save("v2IntCheck", integratoriCheck), [integratoriCheck]);

  // ui state
  const [editingMeal,     setEditingMeal]     = useState(null);
  const [editText,        setEditText]        = useState("");
  const [showCheatForm,   setShowCheatForm]   = useState(false);
  const [cheatForm,       setCheatForm]       = useState({food:"",qty:"",unit:"g",kcal:"",note:""});
  const [showWeightForm,  setShowWeightForm]  = useState(false);
  const [weightInput,     setWeightInput]     = useState("");
  const [weightDateInput, setWeightDateInput] = useState(todayKey());
  const [showMeasForm,    setShowMeasForm]    = useState(false);
  const [measInput,       setMeasInput]       = useState({vita:"",fianchi:"",cosciaDx:"",cosciaSx:"",braccio:"",petto:""});
  const [measDateInput,   setMeasDateInput]   = useState(todayKey());
  const [showWellnessForm,setShowWellnessForm]= useState(false);
  const [wellnessInput,   setWellnessInput]   = useState({sonno:"",gonfiore:"",gonfioreCm:"",note:""});
  const [showAddIntegr,   setShowAddIntegr]   = useState(false);
  const [newIntegr,       setNewIntegr]       = useState({name:"",dose:"",unit:"mg"});
  const [activeBodyTab,   setActiveBodyTab]   = useState("peso");
  const [activeTab,       setActiveTab]       = useState("dieta"); // dieta | corpo | wellness | integratori

  // derived
  const dayName   = keyToDay(selectedKey);
  const weekMenu  = getWeekMenu(selectedKey);
  const todayFasting = fastingMode[selectedKey] || null;
  const baseMeals = weekMenu[dayName] || WEEK1[dayName];
  const dayCustom = customMeals[selectedKey] || {};

  // build active meals merging custom overrides
  let activeMealKeys = Object.keys(baseMeals);
  if (todayFasting === "no_breakfast") activeMealKeys = activeMealKeys.filter(m => m !== "colazione");
  if (todayFasting === "no_dinner")    activeMealKeys = activeMealKeys.filter(m => m !== "cena");
  const dayMeals = Object.fromEntries(activeMealKeys.map(m => [m, dayCustom[m] ?? baseMeals[m]]));

  const dayCheatList   = cheats[selectedKey] || [];
  const totalCheatKcal = dayCheatList.reduce((s,c) => s+(parseInt(c.kcal)||0), 0);
  const completedMealKeys = activeMealKeys.filter(m => checked[selectedKey+"-"+m]);
  const consumedDietKcal  = completedMealKeys.reduce((s,m) => s+(MEAL_KCAL[m]||0), 0);
  const totalKcalDay      = consumedDietKcal + totalCheatKcal;
  const remainingKcal     = Math.max(0, DAILY_KCAL - totalKcalDay);
  const overBudget        = totalKcalDay > DAILY_KCAL;
  const budgetPct         = Math.min(100, Math.round((totalKcalDay/DAILY_KCAL)*100));
  const completedMeals    = completedMealKeys.length;
  const totalMeals        = activeMealKeys.length;
  const mealPct           = Math.round((completedMeals/totalMeals)*100);
  const glasses           = water[selectedKey] || 0;
  const waterPct          = Math.round((glasses/WATER_GLASSES)*100);
  const completedTips     = EXTRA_TIPS.filter(t => tips[selectedKey+"-"+t.id]).length;
  const todayWellness     = wellness[selectedKey] || {};
  const lastWeight        = weightLog.length > 0 ? weightLog[weightLog.length-1] : null;
  const lostKg            = lastWeight ? +(START_KG - lastWeight.kg).toFixed(1) : 0;
  const toGoKg            = lastWeight ? +(lastWeight.kg - GOAL_KG).toFixed(1) : START_KG-GOAL_KG;
  const weightPct         = Math.min(100, Math.max(0, Math.round(((START_KG-(lastWeight?.kg??START_KG))/(START_KG-GOAL_KG))*100)));
  const lastMeas          = measLog.length > 0 ? measLog[measLog.length-1] : null;
  const firstMeas         = measLog.length > 0 ? measLog[0] : null;

  // 7-day strip around selectedKey
  const strip = Array.from({length:7},(_,i) => addDays(selectedKey, i-3));

  // handlers
  const toggleMeal  = m  => setChecked(p => ({...p, [selectedKey+"-"+m]: !p[selectedKey+"-"+m]}));
  const toggleTip   = id => setTips(p    => ({...p, [selectedKey+"-"+id]: !p[selectedKey+"-"+id]}));
  const setGlasses  = n  => setWater(p   => ({...p, [selectedKey]: n}));
  const toggleIntegr= id => setIntegratoriCheck(p => ({...p, [selectedKey+"-"+id]: !p[selectedKey+"-"+id]}));

  const setDayFasting = mode => {
    setFastingMode(p => ({...p, [selectedKey]: p[selectedKey]===mode ? null : mode}));
    setChecked(p => { const n={...p}; Object.keys(MEAL_LABELS).forEach(m => delete n[selectedKey+"-"+m]); return n; });
  };

  const startEdit = meal => { setEditingMeal(meal); setEditText(dayMeals[meal]||""); };
  const saveEdit  = ()   => {
    setCustomMeals(p => ({...p, [selectedKey]: {...(p[selectedKey]||{}), [editingMeal]: editText}}));
    setEditingMeal(null);
  };
  const resetEdit = meal => {
    setCustomMeals(p => { const n={...p}; if(n[selectedKey]) delete n[selectedKey][meal]; return n; });
  };

  const addCheat = () => {
    if (!cheatForm.food.trim()) return;
    const e = {id:Date.now(),...cheatForm,qty:cheatForm.qty||"?",kcal:cheatForm.kcal||""};
    setCheats(p => ({...p,[selectedKey]:[...(p[selectedKey]||[]),e]}));
    setCheatForm({food:"",qty:"",unit:"g",kcal:"",note:""});
    setShowCheatForm(false);
  };
  const removeCheat = id => setCheats(p => ({...p,[selectedKey]:(p[selectedKey]||[]).filter(c=>c.id!==id)}));

  const saveWeight = () => {
    const kg = parseFloat(weightInput.replace(",","."));
    if (isNaN(kg)||kg<30||kg>200) return;
    const entry = {date:weightDateInput, kg};
    setWeightLog(p => [...p.filter(e=>e.date!==weightDateInput),entry].sort((a,b)=>a.date.localeCompare(b.date)));
    setWeightInput(""); setShowWeightForm(false);
  };
  const removeWeight = date => setWeightLog(p => p.filter(e => e.date!==date));

  const saveMeas = () => {
    const entry = {date:measDateInput,...Object.fromEntries(Object.entries(measInput).map(([k,v])=>[k,v?parseFloat(v.replace(",",".")):null]))};
    setMeasLog(p => [...p.filter(e=>e.date!==measDateInput),entry].sort((a,b)=>a.date.localeCompare(b.date)));
    setMeasInput({vita:"",fianchi:"",cosciaDx:"",cosciaSx:"",braccio:"",petto:""}); setShowMeasForm(false);
  };

  const saveWellness = () => {
    const w = {
      sonno:      wellnessInput.sonno      ? parseFloat(wellnessInput.sonno)      : todayWellness.sonno,
      gonfiore:   wellnessInput.gonfiore   ? parseInt(wellnessInput.gonfiore)      : todayWellness.gonfiore,
      gonfioreCm: wellnessInput.gonfioreCm ? parseFloat(wellnessInput.gonfioreCm) : todayWellness.gonfioreCm,
      note:       wellnessInput.note!==""  ? wellnessInput.note                    : todayWellness.note,
    };
    setWellness(p => ({...p,[selectedKey]:{...todayWellness,...Object.fromEntries(Object.entries(w).filter(([,v])=>v!==undefined&&v!==null&&v!==""))}}));
    setWellnessInput({sonno:"",gonfiore:"",gonfioreCm:"",note:""}); setShowWellnessForm(false);
  };

  const addIntegr = () => {
    if (!newIntegr.name.trim()) return;
    setIntegratoriList(p => [...p,{id:Date.now(),...newIntegr}]);
    setNewIntegr({name:"",dose:"",unit:"mg"}); setShowAddIntegr(false);
  };

  const gonfioreEmoji = v => v<=1?"😊":v<=2?"🙂":v<=3?"😐":v<=4?"😔":"😣";
  const measFields = [
    {key:"vita",label:"Vita",icon:"👗"},
    {key:"fianchi",label:"Fianchi",icon:"🔵"},
    {key:"cosciaDx",label:"Coscia Dx",icon:"🦵"},
    {key:"cosciaSx",label:"Coscia Sx",icon:"🦵"},
    {key:"braccio",label:"Braccio",icon:"💪"},
    {key:"petto",label:"Petto",icon:"📏"},
  ];

  const card = {background:"white",borderRadius:16,padding:"16px 18px",marginTop:12,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"};
  const isToday = selectedKey === todayKey();

  return (
    <div style={{minHeight:"100vh",background:"#f0faf4",paddingBottom:80}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#2d6a4f,#40916c)",padding:"24px 20px 16px",color:"white"}}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{fontSize:13,opacity:0.8,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Dieta Antinfiammatoria</div>
          <div style={{fontSize:22,fontWeight:700,marginBottom:2}}>🌿 Il mio tracker</div>
          <div style={{fontSize:13,opacity:0.75}}>1.200 kcal · Obiettivo 50 kg · Paola</div>
        </div>
      </div>

      {/* Date strip */}
      <div style={{background:"white",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex",overflowX:"auto",padding:"10px 12px",gap:6,scrollbarWidth:"none"}}>
          {strip.map(key => {
            const d = new Date(key+"T12:00:00");
            const dn = DAYS[d.getDay()===0?6:d.getDay()-1];
            const isSel = key===selectedKey;
            const isTod = key===todayKey();
            const done  = Object.keys(WEEK1[dn]||{}).filter(m=>checked[key+"-"+m]).length;
            return (
              <button key={key} onClick={()=>setSelectedKey(key)} style={{
                flex:"0 0 auto",display:"flex",flexDirection:"column",alignItems:"center",
                padding:"8px 12px",borderRadius:14,border:"none",cursor:"pointer",
                background:isSel?"#2d6a4f":isTod?"#e8f5f0":"white",
                color:isSel?"white":isTod?"#2d6a4f":"#888",
                boxShadow:isSel?"0 2px 8px rgba(45,106,79,0.4)":"none",
                position:"relative"
              }}>
                <div style={{fontSize:10,fontWeight:600}}>{dn.slice(0,3)}</div>
                <div style={{fontSize:15,fontWeight:700,marginTop:1}}>{d.getDate()}</div>
                {done>0&&<div style={{width:5,height:5,borderRadius:"50%",background:isSel?"rgba(255,255,255,0.7)":"#74c69d",marginTop:3}}/>}
                {isTod&&!isSel&&<div style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:"#f4a261"}}/>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px"}}>

        {/* Bottom tab nav */}
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",boxShadow:"0 -2px 12px rgba(0,0,0,0.08)",zIndex:100,display:"flex",justifyContent:"center"}}>
          <div style={{maxWidth:480,width:"100%",display:"flex"}}>
            {[
              {id:"dieta",   icon:"🥗", label:"Dieta"},
              {id:"corpo",   icon:"⚖️", label:"Corpo"},
              {id:"wellness",icon:"🌙", label:"Benessere"},
              {id:"integr",  icon:"💊", label:"Integratori"},
            ].map(tab=>(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{
                flex:1,padding:"10px 4px 8px",border:"none",background:"none",cursor:"pointer",
                color:activeTab===tab.id?"#2d6a4f":"#aaa",
                borderTop:`2px solid ${activeTab===tab.id?"#2d6a4f":"transparent"}`,
              }}>
                <div style={{fontSize:20}}>{tab.icon}</div>
                <div style={{fontSize:10,fontWeight:activeTab===tab.id?700:400,marginTop:2}}>{tab.label}</div>
              </button>
            ))}
          </div>
        </div>

        {/* ── TAB: DIETA ── */}
        {activeTab==="dieta" && <>

          {/* Budget bar */}
          <div style={{...card,marginTop:8,padding:"12px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:700,color:"#1b4332"}}>📊 Budget {isToday?"oggi":keyLabel(selectedKey)}</span>
              <span style={{fontSize:12,fontWeight:700,color:overBudget?"#c1440e":"#2d6a4f"}}>{totalKcalDay}/{DAILY_KCAL} kcal</span>
            </div>
            <div style={{height:8,borderRadius:8,background:"#e9f5ee",overflow:"hidden",marginBottom:5}}>

                    const min=Math.min(...weightLog.map(e=>e.kg))-0.5;
                    const max=Math.max(...weightLog.map(e=>e.kg))+0.5;
                    const W=320;const H=70;
                    const pts=weightLog.map((e,i)=>{
                      const x=weightLog.length===1?W/2:(i/(weightLog.length-1))*W;
                      const y=H-((e.kg-min)/(max-min))*H;
                      return x+","+y;
                    });
                    return (
                      <div style={{marginBottom:12}}>
                        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:70}}>
                          <polyline points={pts.join(" ")} fill="none" stroke="#40916c" strokeWidth="2.5" strokeLinejoin="round"/>
                          {weightLog.map((e,i)=>{
                            const x=weightLog.length===1?W/2:(i/(weightLog.length-1))*W;
                            const y=H-((e.kg-min)/(max-min))*H;
                            return <circle key={i} cx={x} cy={y} r="4" fill="#2d6a4f"/>;
                          })}
                        </svg>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#aaa"}}>
                          <span>{weightLog[0].date.slice(5)}</span>
                          <span>{weightLog[weightLog.length-1].date.slice(5)}</span>

                      </div>

                    <button onClick={()=>{setShowWeightForm(true);setWeightDateInput(selectedKey);}} style={{width:"100%",padding:10,borderRadius:12,border:"none",background:"linear-gradient(135deg,#74c69d,#2d6a4f)",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>

                      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
                        {measFields.map(f=>(
                          <div key={f.key} style={{flex:"1 1 calc(50% - 8px)",minWidth:120}}>
                            <div style={{fontSize:11,color:"#888",marginBottom:3}}>{f.icon} {f.label} (cm)</div>
                            <input value={measInput[f.key]} onChange={e=>setMeasInput(p=>({...p,[f.key]:e.target.value}))} placeholder="es. 72" type="number" step="0.5" style={{width:"100%",padding:"9px 10px",borderRadius:8,border:"1.5px solid #b7e4c7",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                          </div>
                        ))}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={saveMeas} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"#2d6a4f",color:"white",fontWeight:700,cursor:"pointer"}}>✓ Salva misure</button>
                        <button onClick={()=>setShowMeasForm(false)} style={{padding:"10px 14px",borderRadius:10,border:"1px solid #e0e0e0",background:"white",color:"#aaa",cursor:"pointer"}}>✕</button>
                      </div>
                    </div>
                  ):(
                    <button onClick={()=>{setShowMeasForm(true);setMeasDateInput(selectedKey);}} style={{width:"100%",padding:10,borderRadius:12,border:"none",background:"linear-gradient(135deg,#74c69d,#2d6a4f)",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      📏 Inserisci misure (anche passate)
                    </button>
                  )}
                </div>
              );
            })()}
          </div>
        </>}

        {/* ── TAB: WELLNESS ── */}
        {activeTab==="wellness" && <>
          <div style={{...card,marginTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:16,fontWeight:700,color:"#1b4332"}}>🌙 Benessere — {keyLabel(selectedKey)}</div>
              <button onClick={()=>setShowWellnessForm(v=>!v)} style={{padding:"6px 12px",borderRadius:20,border:"none",background:showWellnessForm?"#f5f5f5":"#d8f3dc",color:showWellnessForm?"#aaa":"#2d6a4f",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                {showWellnessForm?"Annulla":todayWellness.sonno?"✏️ Modifica":"+ Compila"}
              </button>
            </div>
            {(todayWellness.sonno||todayWellness.gonfiore||todayWellness.gonfioreCm)&&!showWellnessForm&&(
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                {todayWellness.sonno&&<div style={{flex:1,textAlign:"center",padding:"10px 6px",borderRadius:12,background:todayWellness.sonno>=7?"#d8f3dc":"#fff8f5",border:`1.5px solid ${todayWellness.sonno>=7?"#95d5b2":"#f4c9b3"}`}}>
                  <div style={{fontSize:18}}>{todayWellness.sonno>=7?"😴✅":"😴"}</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#2d6a4f"}}>{todayWellness.sonno}h</div>
                  <div style={{fontSize:10,color:"#aaa"}}>Sonno</div>
                </div>}
                {todayWellness.gonfiore&&<div style={{flex:1,textAlign:"center",padding:"10px 6px",borderRadius:12,background:todayWellness.gonfiore<=2?"#d8f3dc":"#fff8f5",border:`1.5px solid ${todayWellness.gonfiore<=2?"#95d5b2":"#f4c9b3"}`}}>
                  <div style={{fontSize:18}}>{gonfioreEmoji(todayWellness.gonfiore)}</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#2d6a4f"}}>{todayWellness.gonfiore}/5</div>
                  <div style={{fontSize:10,color:"#aaa"}}>Gonfiore</div>
                </div>}
                {todayWellness.gonfioreCm&&<div style={{flex:1,textAlign:"center",padding:"10px 6px",borderRadius:12,background:"#f8fffe",border:"1.5px solid #e9f5ee"}}>
                  <div style={{fontSize:18}}>📏</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#2d6a4f"}}>{todayWellness.gonfioreCm}cm</div>
                  <div style={{fontSize:10,color:"#aaa"}}>Addome</div>
                </div>}
              </div>
            )}
            {todayWellness.note&&!showWellnessForm&&(
              <div style={{padding:"10px 14px",borderRadius:12,background:"#f8fffe",border:"1.5px solid #e9f5ee",fontSize:13,color:"#555",marginBottom:12,lineHeight:1.5}}>
                📝 {todayWellness.note}
              </div>
            )}
            {showWellnessForm&&(
              <div style={{background:"#f8fffe",border:"1.5px solid #b7e4c7",borderRadius:12,padding:14}}>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:6}}>😴 Ore di sonno</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {[5,5.5,6,6.5,7,7.5,8,8.5,9].map(h=>(
                      <button key={h} onClick={()=>setWellnessInput(p=>({...p,sonno:String(h)}))} style={{flex:"1 1 auto",padding:"7px 4px",borderRadius:8,border:"none",fontSize:11,cursor:"pointer",background:wellnessInput.sonno==h?"#2d6a4f":"#e9f5ee",color:wellnessInput.sonno==h?"white":"#555",fontWeight:wellnessInput.sonno==h?700:400}}>{h}</button>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:6}}>🫃 Gonfiore (1=nessuno · 5=molto)</div>
                  <div style={{display:"flex",gap:8}}>
                    {[1,2,3,4,5].map(v=>(
                      <button key={v} onClick={()=>setWellnessInput(p=>({...p,gonfiore:String(v)}))} style={{flex:1,padding:"10px 4px",borderRadius:8,border:"none",fontSize:18,cursor:"pointer",background:wellnessInput.gonfiore==v?"#2d6a4f":"#e9f5ee"}}>
                        {gonfioreEmoji(v)}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:6}}>📏 Circonferenza addome (cm)</div>
                  <input value={wellnessInput.gonfioreCm} onChange={e=>setWellnessInput(p=>({...p,gonfioreCm:e.target.value}))} placeholder="es. 82" type="number" step="0.5" style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #b7e4c7",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#555",marginBottom:6}}>📝 Note (umore, energia, ciclo...)</div>
                  <textarea value={wellnessInput.note} onChange={e=>setWellnessInput(p=>({...p,note:e.target.value}))} placeholder="Come ti sei sentita oggi?" rows={3} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #b7e4c7",fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit",resize:"vertical"}}/>
                </div>
                <button onClick={saveWellness} style={{width:"100%",padding:11,borderRadius:10,border:"none",background:"linear-gradient(135deg,#74c69d,#2d6a4f)",color:"white",fontWeight:700,fontSize:14,cursor:"pointer"}}>✓ Salva benessere</button>
              </div>
            )}
            {!todayWellness.sonno&&!todayWellness.gonfiore&&!showWellnessForm&&(
              <div style={{textAlign:"center",fontSize:12,color:"#aaa",padding:"8px 0"}}>Nessun dato per questo giorno 🌿</div>
            )}
          </div>
        </>}

        {/* ── TAB: INTEGRATORI ── */}
        {activeTab==="integr" && <>
          <div style={{...card,marginTop:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div style={{fontSize:16,fontWeight:700,color:"#1b4332"}}>💊 Integratori</div>
                <div style={{fontSize:12,color:"#74c69d",marginTop:2}}>{integratoriList.filter(i=>integratoriCheck[selectedKey+"-"+i.id]).length}/{integratoriList.length} presi oggi</div>
              </div>
              <button onClick={()=>setShowAddIntegr(v=>!v)} style={{padding:"6px 12px",borderRadius:20,border:"none",background:showAddIntegr?"#f5f5f5":"#d8f3dc",color:showAddIntegr?"#aaa":"#2d6a4f",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                {showAddIntegr?"Annulla":"+ Aggiungi"}
              </button>
            </div>
            {showAddIntegr&&(
              <div style={{background:"#f8fffe",border:"1.5px solid #b7e4c7",borderRadius:12,padding:12,marginBottom:12}}>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <input value={newIntegr.name} onChange={e=>setNewIntegr(p=>({...p,name:e.target.value}))} placeholder="Nome" style={{flex:2,padding:"8px 10px",borderRadius:8,border:"1.5px solid #b7e4c7",fontSize:12,outline:"none"}}/>
                  <input value={newIntegr.dose} onChange={e=>setNewIntegr(p=>({...p,dose:e.target.value}))} placeholder="Dose" style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1.5px solid #b7e4c7",fontSize:12,outline:"none"}}/>
                  <select value={newIntegr.unit} onChange={e=>setNewIntegr(p=>({...p,unit:e.target.value}))} style={{flex:1,padding:"8px 6px",borderRadius:8,border:"1.5px solid #b7e4c7",fontSize:12,outline:"none",background:"white"}}>
                    <option>mg</option><option>g</option><option>UI</option><option>cps</option><option>ml</option><option>gocce</option>
                  </select>
                </div>
                <button onClick={addIntegr} style={{width:"100%",padding:9,borderRadius:8,border:"none",background:"#40916c",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>✓ Salva</button>
              </div>
            )}
            {integratoriList.map(integ=>{
              const key=selectedKey+"-"+integ.id;
              const done=!!integratoriCheck[key];
              return(
                <div key={integ.id} onClick={()=>toggleIntegr(integ.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,background:done?"#d8f3dc":"#f8fffe",border:`1.5px solid ${done?"#95d5b2":"#e9f5ee"}`,cursor:"pointer",marginBottom:8}}>
                  <div style={{fontSize:20}}>💊</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:done?"#2d6a4f":"#555",textDecoration:done?"line-through":"none"}}>{integ.name}</div>
                    {integ.dose&&<div style={{fontSize:11,color:"#aaa"}}>{integ.dose} {integ.unit}</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:done?"#2d6a4f":"white",border:`2px solid ${done?"#2d6a4f":"#b7e4c7"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {done&&<span style={{color:"white",fontSize:13,fontWeight:700}}>✓</span>}
                    </div>
                    <button onClick={e=>{e.stopPropagation();setIntegratoriList(p=>p.filter(i=>i.id!==integ.id));}} style={{background:"none",border:"none",fontSize:14,color:"#ddd",cursor:"pointer"}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
